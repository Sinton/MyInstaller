packages:
  - name: TypeScript
    install-command: npm install -g typescript@latest
    version-check-command: npm view typescript version
    local-version-command: npm list -g typescript --depth=0
  - name: pnpm Package Manager
    install-command: npm install -g pnpm@latest
    version-check-command: npm view pnpm version
    local-version-command: pnpm --version
